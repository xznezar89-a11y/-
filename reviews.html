<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آراء العملاء - برمج موقعك</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <div class="logo">برمج موقعك</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="lang-toggle" class="theme-toggle" title="تغيير اللغة" style="font-size: 1rem; font-weight: 700; border-radius: 50%; display: flex; justify-content: center; align-items: center;">🇺🇸</button>
            <button id="theme-toggle" class="theme-toggle" title="تغيير المظهر">🌙</button>
            <div class="menu-btn" id="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <nav class="nav-links" id="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="agents.html">وكلاء الشراء</a>
            <a href="reviews.html" class="active">آراء العملاء</a>
            <a href="support.html">الدعم الفني</a>
        </nav>
    </header>

    <main class="container" style="min-height: 50vh;">
        <h1 class="page-title fade-in">آراء العملاء</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;" class="fade-in">تعرف على تجارب عملائنا السابقين وشاركنا تجربتك الخاصة.</p>

        <!-- شريط آراء العملاء -->
        <section class="testimonials-section fade-in" id="testimonials">
            <h2>ماذا يقول عملاؤنا؟</h2>
            <div class="marquee-wrapper" dir="ltr" id="marquee-wrapper">
                <!-- سيتم توليد محتوى التعليقات هنا عبر الجافاسكريبت -->
            </div>

            <div class="review-form-container">
                <h3 style="text-align: center; margin-bottom: 20px;">أضف تقييمك</h3>
                <form id="add-review-form">
                    <div class="input-group">
                        <label for="reviewer-name">اسمك الكريم</label>
                        <input type="text" id="reviewer-name" required placeholder="أدخل اسمك">
                    </div>
                    <div class="input-group" style="text-align: right;">
                        <label>تقييمك</label>
                        <div class="star-rating" id="star-rating">
                            <span class="star" data-value="5">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="1">★</span>
                        </div>
                        <input type="hidden" id="reviewer-rating" value="5" required>
                    </div>
                    <div class="input-group">
                        <label for="reviewer-msg">رسالتك / تقييمك</label>
                        <input type="text" id="reviewer-msg" required placeholder="اكتب ما في خاطرك...">
                    </div>
                    <button type="submit" class="btn-primary">إرسال التقييم</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <h3 style="margin-bottom: 15px; color: var(--primary-color);">روابط هامة:</h3>
            <a href="support.html" style="color: var(--text-primary); text-decoration: underline;">الدعم الفني وطرق التواصل (الشراء)</a>
        </div>
        
        <div class="footer-bottom">
            <p>جميع الحقوق محفوظة من متجر البرمجة &copy; 2026</p>
            <a href="login.html" class="hidden-login" title="تسجيل الدخول للإدارة">دخول</a>
        </div>
    </footer>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
